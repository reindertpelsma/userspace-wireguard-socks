realm: "example.org"
software: "go-open-turn"
allocation_ttl: "10m"
nonce_ttl: "10m"
preopen_single_ports: false

listen:
  turn_listen: "0.0.0.0:3478"
  relay_ip: "203.0.113.10"

users:
  - username: "wireguard" # NOTE: username is sent in clear over the wire
    password: "super-secret-turn-password" #Change password
    port: 51820
    permission_behavior: "allow"
    source_networks:
      - "0.0.0.0/0"
    mapped_address: "203.0.113.10:51820"
    wireguard_mode: server-only # Options: disabled (no UDP), server-only (force server public key), default-with-overwrite (public key can be chosen by client by embedding in username), required-in-username
    wireguard_public_key: QyKFXQYSiIBEP//EMBNonpi2PwHtp2c4dPwRWZt5RFI=

