realm: "example.org"
software: "go-open-turn"
allocation_ttl: "10m"
nonce_ttl: "10m"
preopen_single_ports: false

listen:
  turn_listen: "0.0.0.0:3478"
  relay_ip: "203.0.113.10"

users:
  - username: "alice"
    password: "alice-pass"
    port: 40000
    permission_behavior: "allow"
    source_networks:
      - "0.0.0.0/0"
    mapped_address: "203.0.113.10:40000"
    # Optional WireGuard filtering:
    # wireguard_mode: server-only
    # wireguard_public_key: BASE64_PUBLIC_KEY_HERE

  - username: "bob"
    password: "bob-pass"
    port: 40001
    permission_behavior: "reject-unless-permitted"
    source_networks:
      - "192.168.0.0/16"
      - "10.0.0.0/8"
    mapped_address: "203.0.113.10:50001"
    outbound_only: true

  - username: "batch-worker"
    password: "batch-pass"
    port_range_start: 45000
    port_range_end: 45007
    source_networks:
      - "10.0.0.0/8"
    mapped_range:
      ip: "203.0.113.10"
      start_port: 55000

  - username: "mesh-node"
    password: "mesh-pass"
    port: 40050
    source_networks:
      - "127.0.0.0/8"
    internal_only: true

port_ranges:
  - start: 41000
    end: 41099
    password: "shared-range-secret"
    permission_behavior: "allow-if-no-permissions"
    source_networks:
      - "0.0.0.0/0"
    mapped_range:
      ip: "203.0.113.10"
      start_port: 51000

  - start: 42000
    end: 42031
    password: "lab-secret"
    permission_behavior: "allow"
    source_networks:
      - "127.0.0.0/8"
      - "10.0.0.0/8"
    mapped_range:
      ip: "198.51.100.25"
      start_port: 62000
    internal_only: true
