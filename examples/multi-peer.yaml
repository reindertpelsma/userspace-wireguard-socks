# Minimal multi-peer server shape. Each peer gets its own AllowedIPs entry; when
# prefixes overlap, uwgsocks follows the most-specific prefix.
wireguard:
  private_key: SERVER_PRIVATE_KEY_BASE64
  listen_port: 51820
  addresses:
    - 100.64.200.1/24
  peers:
    - public_key: PEER_A_PUBLIC_KEY_BASE64
      allowed_ips:
        - 100.64.200.2/32
        - 10.10.0.0/16
    - public_key: PEER_B_PUBLIC_KEY_BASE64
      allowed_ips:
        - 100.64.200.3/32
        - 10.10.42.0/24

proxy:
  socks5: 127.0.0.1:1080

relay:
  enabled: true

acl:
  relay_default: deny
  relay:
    - action: allow
      source: 100.64.200.0/24
      destination: 100.64.200.0/24
