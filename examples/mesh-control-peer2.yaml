  private_key: cIYDYnnDMGVmIggrKW+mkAJDpB8YEmdC3gBaFELCtUI=
  addresses:
    - 100.64.80.3/32
  peers:
    - public_key: r4fi5ZkPzyk1kNywYwd8F1oEsdyo1JE1Sogzcgxuhwg=
      preshared_key: 8PxUasdty53JC9r/oCE6xWDKmOP6zbaTrFXiVQpvem8=
      endpoint: 127.0.0.1:51820
      allowed_ips:
        - 100.64.80.1/32
