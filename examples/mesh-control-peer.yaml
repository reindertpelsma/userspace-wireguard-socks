  addresses:
    - 100.64.80.2/32
  peers:
    - public_key: r4fi5ZkPzyk1kNywYwd8F1oEsdyo1JE1Sogzcgxuhwg=
      preshared_key: 8CXDYhra0VTDEZGyhG83uJkcOiD2ZaSLXy9ma3T1glw=
