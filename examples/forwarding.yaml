# Demonstrates runnable local forwards and tunnel-side reverse forwards for the
# how-to guide. The tunnel target addresses line up with examples/server.yaml
# and a local demo app.
wireguard:
  config_file: ./examples/client.conf

proxy:
  socks5: 127.0.0.1:1080
  http: 127.0.0.1:8082
  fallback_direct: false

forwards:
  # Host-side TCP listener. Connecting to 127.0.0.1:18081 reaches a web app
  # bound on the server host at 127.0.0.1:8081 through the tunnel.
  - proto: tcp
    listen: 127.0.0.1:18081
    target: 100.64.90.1:8081

  # Host-side UDP listener for the server-side tunnel DNS listener.
  - proto: udp
    listen: 127.0.0.1:15353
    target: 100.64.90.1:53

reverse_forwards:
  # Tunnel-side listener. Reaching 100.64.90.99:8080 over WireGuard forwards
  # back to a host-local web app on this client machine.
  - proto: tcp
    listen: 100.64.90.99:8080
    target: 127.0.0.1:8080
