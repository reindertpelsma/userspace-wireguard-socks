# Hub / relay server with mesh control enabled. Child uwgsocks peers can fetch
# currently active peers and, when the outer transport is UDP-capable, attempt
# direct WireGuard child sessions.

wireguard:
  private_key: mIGJUVTuC1A/mcfmRyqQf0HU2TWhMJ48GOd9/OBErFQ=
  listen_port: 51820
  addresses:
    - 100.64.80.1/32
  peers:
    - public_key: QW//VpYXzIv1BICJnx9uhSRWpZu907yw/mJqTwfXZ3Q=
      preshared_key: Qrs3RDGqMFVjWVu1CXX4C3gs8tGvIva3/LlljSBjNSc=
      allowed_ips:
        - 100.64.80.2/32
      mesh_enabled: true
      mesh_accept_acls: true
    - public_key: 2xFvHNBakpLrpqUYYQ0mrhEUq1re0csy4e7dY5Lg2C0=
      preshared_key: GmKU1AsoGV+0Q7AyeDpljGM8wuoHgobGQQlit8pC554=
      allowed_ips:
        - 100.64.80.3/32
      mesh_enabled: true
      mesh_accept_acls: true
      mesh_trust: trusted_if_dynamic_acls

mesh_control:
  listen: 100.64.80.1:8787
  active_peer_window_seconds: 120

relay:
  enabled: true
  conntrack: true

acl:
  relay_default: deny
  relay:
    - action: allow
      source: 100.64.80.2/32
      destination: 100.64.80.3/32
      protocol: tcp
      destination_port: 443

dns_server:
  listen: 100.64.80.1:53

api:
  listen: unix://uwgsocks.sock
