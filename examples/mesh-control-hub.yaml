# Hub / relay server with mesh control enabled. Child uwgsocks peers can fetch
# the active peer list, learn projected ACLs, and keep a working relay path
# while they also try direct WireGuard sessions.

wireguard:
  private_key: qB9WhJbIT1jyY0Go6d3UAIYK+RlGo+ElwESBC/f9VGU=
  listen_port: 51820
  addresses:
    - 100.64.80.1/32
  peers:
    - public_key: NU/tZS6y+fCf9kepK4R8z05/BvftWcxkEk7Gl0iRdXU=
      preshared_key: 8CXDYhra0VTDEZGyhG83uJkcOiD2ZaSLXy9ma3T1glw=
      allowed_ips:
        - 100.64.80.2/32
      mesh_enabled: true
      mesh_accept_acls: true
    - public_key: Ba9+418zSeHDBiVcQheIzN+TL49gblCl/7RGYpSf+Bs=
      preshared_key: 8PxUasdty53JC9r/oCE6xWDKmOP6zbaTrFXiVQpvem8=
      allowed_ips:
        - 100.64.80.3/32
      mesh_enabled: true
      mesh_accept_acls: true
      mesh_trust: trusted_if_dynamic_acls

mesh_control:
  listen: 100.64.80.1:8787
  active_peer_window_seconds: 120

relay:
  enabled: true
  conntrack: true

acl:
  relay_default: deny
  relay:
    - action: allow
      source: 100.64.80.2/32
      destination: 100.64.80.1/32
      protocol: tcp
      destination_port: 8787
    - action: allow
      source: 100.64.80.3/32
      destination: 100.64.80.1/32
      protocol: tcp
      destination_port: 8787
    - action: allow
      source: 100.64.80.2/32
      destination: 100.64.80.3/32
      protocol: tcp
      destination_port: 8088

dns_server:
  listen: 100.64.80.1:53

api:
  listen: unix://uwgsocks.sock
