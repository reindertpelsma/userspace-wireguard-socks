name: Go Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets
          gcc -shared -fPIC -O2 -Wall -Wextra \
            -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Run standalone TURN tests
        shell: bash
        run: |
          set -euo pipefail
          cd turn
          go test ./...

      - name: Real Linux host-TUN smoke test
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            -e UWG_TEST_REAL_TUN=1 \
            -v "$PWD":/src -w /src golang:1.25 \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOFLAGS=-buildvcs=false && apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && /bin/bash ./compile.sh >/dev/null && go test ./internal/tun -run TestRealLinuxTUNConfigureSmallRoute -count=1'

      - name: Real macOS host-TUN smoke test
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          sudo env UWG_TEST_REAL_TUN=1 go test ./internal/tun -run TestRealUTUNConfigureSmallRoute -count=1

      - name: Install Wintun
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          $dir = Join-Path $env:RUNNER_TEMP 'wintun'
          Invoke-WebRequest -Uri 'https://www.wintun.net/builds/wintun-0.14.1.zip' -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $dir -Force
          Copy-Item (Join-Path $dir 'wintun\bin\amd64\wintun.dll') 'C:\Windows\System32\wintun.dll' -Force

      - name: Real Windows host-TUN smoke test
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:UWG_TEST_REAL_TUN = '1'
          go test ./internal/tun -run TestRealWindowsTUNConfigureSmallRoute -count=1

  test-lite:
    name: lite ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run lite tests
        shell: bash
        run: go test -tags lite ./...
