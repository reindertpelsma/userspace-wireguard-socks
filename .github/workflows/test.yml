name: Go Tests

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
              apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && \
              mkdir -p cmd/uwgwrapper/assets && \
              gcc -shared -fPIC -O2 -Wall -Wextra \
                -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Run tests
        if: runner.os != 'Linux'
        shell: bash
        run: go test ./...

      - name: Run tests (Linux core)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '/tests/preload$')
          go test "${packages[@]}"

      - name: Run tests (Linux preload retry)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          go test ./tests/preload/... || go test ./tests/preload/...

      - name: Install chromium for real-internet smoke
        if: runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          # Headless chromium-style binary; chromium-browser pulls in
          # the snap on some runners, so we use the apt package.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium chromium-driver \
            || sudo apt-get install -y --no-install-recommends chromium-browser \
            || true
          if command -v chromium >/dev/null 2>&1; then
            echo "UWGS_CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "UWGS_CHROME_BIN=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          fi

      - name: Run chromium real-internet smoke
        if: runner.os == 'Linux'
        # GH-runner-environment quirks (snap-confined chromium, dbus,
        # GCM probes hitting deprecated Google endpoints) historically
        # produce flakes unrelated to the wrapper. Continue-on-error so
        # CI signal stays useful even when the runner env misbehaves;
        # local + self-hosted runs surface real regressions.
        continue-on-error: true
        env:
          UWGS_RUN_CHROMIUM_REAL_INTERNET: "1"
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${UWGS_CHROME_BIN:-}" ]; then
            echo "no chromium binary detected; skipping smoke"
            exit 0
          fi
          go test -count=1 -timeout 240s -run TestChromiumRealInternetSmoke -v ./tests/preload/

      # The "Final Boss" smoke: chromium under systrap-supervised
      # against real-internet (example.com → wikipedia → youtube)
      # with the zygote ACTIVE and no UWGS_DISABLE_SECCOMP. This
      # is the load-bearing chromium fork+exec validation; it
      # subsumes the simpler chromium real-internet smoke above
      # but we keep both for now (the simpler one runs against
      # apt-installed chromium; this one needs chrome-headless-
      # shell because apt-installed chromium is snap-confined and
      # can't load LD_PRELOAD from /tmp).
      - name: Install chrome-headless-shell for supervised smoke
        if: runner.os == 'Linux' && matrix.name == 'linux-amd64'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/chs"
          cd "$RUNNER_TEMP/chs"
          # Get the latest stable chrome-headless-shell linux64
          # tarball URL and unpack it. linux64 only — Chrome for
          # Testing doesn't ship arm64.
          URL=$(curl -sSL https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print([x["url"] for x in d["channels"]["Stable"]["downloads"]["chrome-headless-shell"] if x["platform"]=="linux64"][0])')
          curl -sSL "$URL" -o chs.zip
          unzip -q chs.zip
          BIN=$(find . -name chrome-headless-shell -executable | head -1)
          echo "UWGS_CHROME_BIN_SUPERVISED=$BIN" >> "$GITHUB_ENV"
          echo "got chrome-headless-shell at $BIN"

      - name: Run chromium-supervised real-internet smoke (final boss)
        if: runner.os == 'Linux' && matrix.name == 'linux-amd64'
        # Chrome-for-testing download flakes + GH-runner network
        # to youtube can be intermittent; continue-on-error so
        # CI signal stays clean. Self-hosted + dev runs surface
        # real regressions in this path.
        continue-on-error: true
        env:
          UWGS_RUN_CHROMIUM_SUPERVISED: "1"
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${UWGS_CHROME_BIN_SUPERVISED:-}" ]; then
            echo "chrome-headless-shell not installed; skipping supervised smoke"
            exit 0
          fi
          UWGS_CHROME_BIN="$UWGS_CHROME_BIN_SUPERVISED" \
            go test -count=1 -timeout 360s -run TestChromiumSystrapSupervisedRealInternet -v ./tests/preload/

      - name: Run standalone TURN tests
        shell: bash
        run: |
          set -euo pipefail
          cd turn
          go test ./...

      - name: Real Linux host-TUN smoke test
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            -e UWG_TEST_REAL_TUN=1 \
            -v "$PWD":/src -w /src golang:1.25 \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOFLAGS=-buildvcs=false && apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && /bin/bash ./compile.sh >/dev/null && go test ./internal/tun -run TestRealLinuxTUNConfigureSmallRoute -count=1'

      - name: Real macOS host-TUN smoke test
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          sudo env UWG_TEST_REAL_TUN=1 go test ./internal/tun -run TestRealUTUNConfigureSmallRoute -count=1

      - name: Install Wintun
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          $dir = Join-Path $env:RUNNER_TEMP 'wintun'
          Invoke-WebRequest -Uri 'https://www.wintun.net/builds/wintun-0.14.1.zip' -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $dir -Force
          Copy-Item (Join-Path $dir 'wintun\bin\amd64\wintun.dll') 'C:\Windows\System32\wintun.dll' -Force

      - name: Real Windows host-TUN smoke test
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:UWG_TEST_REAL_TUN = '1'
          go test ./internal/tun -run TestRealWindowsTUNConfigureSmallRoute -count=1

  test-lite:
    name: lite ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
              apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && \
              mkdir -p cmd/uwgwrapper/assets && \
              gcc -shared -fPIC -O2 -Wall -Wextra \
                -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Run lite tests
        shell: bash
        run: |
          # Retry once on flaky ptrace-only mode tests (same pattern as
          # the main test step); the underlying tests are correct, but
          # GH-runner CPU contention occasionally trips the timeouts.
          go test -tags lite ./... || go test -tags lite ./...

  # Slim musl matrix on every push: catches musl-only build/runtime
  # divergences (e.g., struct timespec without <time.h>, sendmmsg flags
  # arg type) before they compound. The full glibc 2.27/2.31/2.36 +
  # musl current/older × amd64+arm64 matrix lives in release.yml's
  # preload-libc-matrix and runs on tag pushes only.
  preload-musl:
    name: preload musl ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            runner: ubuntu-latest
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Run a representative preload subset under golang:alpine (musl)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            golang:1.24-alpine \
            sh -c '
              apk add --no-cache gcc musl-dev linux-headers git bash file >/dev/null
              export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto
              git init -q . 2>/dev/null || true
              # Slim test set: lock primitives + Phase 2 Go-static (the
              # paths we know work under musl). The arm64+musl+static-PIE
              # +C corner case is documented as a known limitation in
              # preload/PHASE2_DESIGN.md and excluded from this CI subset.
              go test -buildvcs=false -count=1 -timeout 480s \
                -run "TestPhase1Fxlock|TestPhase1CacheRace|TestPhase2StaticGo" \
                ./tests/preload/
            '

  cross-build:
    name: cross-build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-build uwgsocks
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go build -trimpath ./cmd/uwgsocks
          go build -tags lite -trimpath ./cmd/uwgsocks
          cd turn && go build -trimpath .
