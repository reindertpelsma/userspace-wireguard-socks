name: Release Builds

on:
  push:
    tags:
      - '*'
      - '*/*'

permissions:
  contents: write
  packages: write

jobs:
  release-test:
    name: release test ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
              apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && \
              mkdir -p cmd/uwgwrapper/assets && \
              gcc -shared -fPIC -O2 -Wall -Wextra \
                -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Run tests
        if: runner.os != 'Linux'
        shell: bash
        run: go test ./...

      - name: Run tests (Linux core)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '/tests/preload$')
          go test "${packages[@]}"

      - name: Run tests (Linux preload retry)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          go test ./tests/preload/... || go test ./tests/preload/...

      - name: Run standalone TURN tests
        shell: bash
        run: |
          set -euo pipefail
          cd turn
          go test ./...

      - name: Real Linux host-TUN smoke test
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            -e UWG_TEST_REAL_TUN=1 \
            -v "$PWD":/src -w /src golang:1.25 \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOFLAGS=-buildvcs=false && apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && /bin/bash ./compile.sh >/dev/null && go test ./internal/tun -run TestRealLinuxTUNConfigureSmallRoute -count=1'

      - name: Real macOS host-TUN smoke test
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          sudo env UWG_TEST_REAL_TUN=1 go test ./internal/tun -run TestRealUTUNConfigureSmallRoute -count=1

      - name: Install Wintun
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          $dir = Join-Path $env:RUNNER_TEMP 'wintun'
          Invoke-WebRequest -Uri 'https://www.wintun.net/builds/wintun-0.14.1.zip' -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $dir -Force
          Copy-Item (Join-Path $dir 'wintun\\bin\\amd64\\wintun.dll') 'C:\\Windows\\System32\\wintun.dll' -Force

      - name: Real Windows host-TUN smoke test
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:UWG_TEST_REAL_TUN = '1'
          go test ./internal/tun -run TestRealWindowsTUNConfigureSmallRoute -count=1

      - name: Run soak test
        shell: bash
        run: |
          set -euo pipefail
          UWGS_SOAK=1 UWGS_SOAK_SECONDS=15 go test ./tests/soak -run TestLoopbackImpairedChattySOCKSSoak -count=1

      # Race-detector run on the concurrency-sensitive packages.
      # Runs on every release-CI platform because different runtimes
      # (sched/M:N mapping, libc/syscall behavior) surface different
      # races. tests/preload is added to the package list only on
      # Linux because the preload subsystem itself is Linux-only;
      # the other packages are portable Go code.
      - name: Race-detector run on concurrency-sensitive packages
        shell: bash
        run: |
          set -euo pipefail
          # TSan suppressions for documented third-party false positives.
          # Windows can't take a path with backslashes here — TSan parses
          # them as suppressions= separators (D:\ becomes another '='
          # token). Skip Windows; the suppressed pattern doesn't surface
          # there anyway. Linux + macOS get the full file via forward
          # slashes (github.workspace already uses /).
          if [ "${{ runner.os }}" != "Windows" ]; then
            export GORACE="suppressions=${{ github.workspace }}/.gorace.suppressions"
          fi
          packages=(
            ./internal/engine
            ./internal/transport
            ./internal/fdproxy
            ./tests/malicious
          )
          if [ "${{ runner.os }}" = "Linux" ]; then
            packages+=( ./tests/preload )
          fi
          go test -race "${packages[@]}" -count=1 -timeout 900s

      # Stress tests for the fdproxy lock model. Cheap (~2s each) but
      # gated UWGS_STRESS=1 so they don't run on every PR push; the
      # release pipeline always exercises them on every platform.
      - name: Stress tests for fdproxy lock model
        shell: bash
        run: |
          set -euo pipefail
          UWGS_STRESS=1 go test -race ./internal/fdproxy -run TestStress -count=1 -timeout 60s

      # Fuzz the strict wg-quick parser and the ACL rule parser for a
      # short window on every release-CI platform — different OS file-
      # IO timing surfaces different fuzzed paths. The seed corpus
      # already runs as a regular test on every PR push; this
      # stretches it for ~30s per target.
      #
      # Skipped on macOS-latest AND windows-latest: Go's fuzz worker
      # model deadlocks after the first few seconds (workers hit 0
      # execs/sec and never recover, eventually hitting context
      # deadline). Reproduced on both runner OSes in v0.1.0-beta.{25,26}.
      # Also skipped on linux-arm64 — same Go-fuzz worker IPC stall
      # reproduces on the GH arm64 runner (v0.1.0-beta.40, FuzzACLParseRule
      # froze at 0 execs/sec for 22s and exited with context deadline).
      # The fuzz corpus already runs as a regular non-fuzz test on every
      # PR push across all platforms — what's lost here is the ~30s of
      # extra random exploration on arm64, not the corpus coverage
      # itself. The Go fuzz IPC implementation is effectively linux/amd64
      # only at GH-runner load levels.
      - name: Fuzz untrusted-input parsers
        if: runner.os == 'Linux' && runner.arch == 'X64'
        shell: bash
        run: |
          set -euo pipefail
          go test ./tests/malicious -run '^$' -fuzz '^FuzzMergeWGQuickStrict$' -fuzztime 30s
          go test ./tests/malicious -run '^$' -fuzz '^FuzzACLParseRule$' -fuzztime 30s
          go test ./tests/malicious -run '^$' -fuzz '^FuzzConfigParsers$' -fuzztime 30s

  release-test-lite:
    name: release lite ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
              apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && \
              mkdir -p cmd/uwgwrapper/assets && \
              gcc -shared -fPIC -O2 -Wall -Wextra \
                -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Run lite tests
        shell: bash
        run: go test -tags lite ./...

  build-uwgsocks:
    name: uwgsocks ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: uwgsocks-linux-riscv64
          - goos: linux
            goarch: mips
            artifact_name: uwgsocks-linux-mips
          - goos: linux
            goarch: mipsle
            artifact_name: uwgsocks-linux-mipsle
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: uwgsocks-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: uwgsocks-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: uwgsocks-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: uwgsocks-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgsocks-lite:
    name: uwgsocks-lite ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-lite-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-lite-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: uwgsocks-lite-linux-riscv64
          - goos: linux
            goarch: mips
            artifact_name: uwgsocks-lite-linux-mips
          - goos: linux
            goarch: mipsle
            artifact_name: uwgsocks-lite-linux-mipsle
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-lite-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-lite-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: uwgsocks-lite-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: uwgsocks-lite-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: uwgsocks-lite-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: uwgsocks-lite-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-lite-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-lite-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks-lite
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -tags lite -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-turn:
    name: turn ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: turn-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: turn-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: turn-linux-riscv64
          - goos: linux
            goarch: mips64
            artifact_name: turn-linux-mips64
          - goos: darwin
            goarch: amd64
            artifact_name: turn-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: turn-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: turn-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: turn-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: turn-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: turn-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: turn-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: turn-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: turn/go.mod

      - name: Build turn
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cd turn
          go build -trimpath -ldflags='-s -w' -o "../dist/${{ matrix.artifact_name }}" .

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgwrapper:
    name: uwgwrapper linux ${{ matrix.goarch }} ${{ matrix.libc }}
    runs-on: ${{ matrix.runner }}
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            libc: gnu
            runner: ubuntu-latest
            zig_target: x86_64-linux-gnu
            artifact_name: uwgwrapper-linux-amd64-gnu
          - goarch: amd64
            libc: musl
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
            artifact_name: uwgwrapper-linux-amd64-musl
          - goarch: arm64
            libc: gnu
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-gnu
            artifact_name: uwgwrapper-linux-arm64-gnu
          - goarch: arm64
            libc: musl
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-musl
            artifact_name: uwgwrapper-linux-arm64-musl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      # Run preload and wrapper tests before building the release artifact.
      # gnu: run tests on the host runner, but build the shipped preload asset later in
      #      a bullseye container for an older glibc baseline.
      # musl: test inside a Docker golang:alpine container so LD_PRELOAD resolves against musl.
      - name: Test preload and wrapper (gnu)
        if: matrix.libc == 'gnu'
        run: |
          set -euo pipefail
          go test ./internal/uwgtrace/... ./internal/fdproxy/...
          go test ./tests/preload/... || go test ./tests/preload/...

      - name: Test preload and wrapper (musl)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          # golang:alpine uses musl; tests must run inside it so LD_PRELOAD resolves against musl.
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            golang:alpine \
            sh -c "apk add --no-cache gcc musl-dev linux-headers && \
                   mkdir -p cmd/uwgwrapper/assets && \
                   gcc -shared -fPIC -O2 -Wall -Wextra \
                     -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread && \
                   go test ./internal/uwgtrace/... ./internal/fdproxy/... && \
                   (go test ./tests/preload/... || go test ./tests/preload/...)"
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Build uwgwrapper preload asset (gnu baseline)
        if: matrix.libc == 'gnu'
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
                     apt-get update >/dev/null && \
                     apt-get install -y gcc libc6-dev >/dev/null && \
                     gcc -shared -fPIC -O2 -Wall -Wextra \
                       -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Build uwgwrapper preload asset (musl)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          zig cc -target ${{ matrix.zig_target }} -shared -fPIC -O2 -Wall -Wextra \
            -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread

      - name: Build uwgwrapper
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgwrapper

      - name: Show artifact details
        run: |
          ls -lh dist cmd/uwgwrapper/assets
          file "dist/${{ matrix.artifact_name }}" || true
          file cmd/uwgwrapper/assets/uwgpreload.so || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  # preload + wrapper test matrix across multiple libc versions and
  # both architectures. The shipped uwgsocks/turn binaries are
  # CGO_ENABLED=0 static and don't care about libc, but uwgpreload.so
  # links against the host's libc so it MUST work on every glibc and
  # musl version we claim to support. This job builds + runs the
  # preload integration suite against five different libcs (glibc
  # 2.27 / 2.31 / 2.36 + musl 1.2.x in two flavors) on each arch.
  # Total: 10 parallel matrix entries; ~3 min wall time.
  preload-libc-matrix:
    name: preload libc ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs:
      - release-test
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc 2.27 — Ubuntu 18.04, oldest claimed-supported glibc.
          # Go 1.10 in repos is too old; install go1.24 from tarball.
          # NOTE: install scripts MUST be one-liners with && chains —
          # multi-line YAML scalars get interpolated into sh -c '...'
          # with literal newlines, which leaves stray semicolons on
          # their own lines and breaks the shell with "; unexpected".
          - name: glibc-2.27-amd64
            runner: ubuntu-latest
            image: ubuntu:18.04
            install: 'DEBIAN_FRONTEND=noninteractive apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gcc libc6-dev git wget ca-certificates >/dev/null && wget -q https://go.dev/dl/go1.25.0.linux-amd64.tar.gz -O /tmp/go.tgz && tar -C /usr/local -xzf /tmp/go.tgz'
          - name: glibc-2.27-arm64
            runner: ubuntu-24.04-arm
            image: ubuntu:18.04
            install: 'DEBIAN_FRONTEND=noninteractive apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gcc libc6-dev git wget ca-certificates >/dev/null && wget -q https://go.dev/dl/go1.25.0.linux-arm64.tar.gz -O /tmp/go.tgz && tar -C /usr/local -xzf /tmp/go.tgz'
          # glibc 2.31 — Debian Bullseye / Ubuntu 20.04, golang image
          # already has Go installed, much faster than tarball install.
          - name: glibc-2.31-amd64
            runner: ubuntu-latest
            image: golang:1.24-bullseye
            install: 'apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gcc libc6-dev git >/dev/null'
          - name: glibc-2.31-arm64
            runner: ubuntu-24.04-arm
            image: golang:1.24-bullseye
            install: 'apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gcc libc6-dev git >/dev/null'
          # glibc 2.36 — Debian Bookworm, the current stable.
          - name: glibc-2.36-amd64
            runner: ubuntu-latest
            image: golang:1.24-bookworm
            install: 'apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gcc libc6-dev git >/dev/null'
          - name: glibc-2.36-arm64
            runner: ubuntu-24.04-arm
            image: golang:1.24-bookworm
            install: 'apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gcc libc6-dev git >/dev/null'
          # musl current — golang:1.24-alpine (Alpine 3.20+, musl 1.2.5+)
          - name: musl-current-amd64
            runner: ubuntu-latest
            image: golang:1.24-alpine
            install: 'apk add --no-cache gcc musl-dev linux-headers git'
          - name: musl-current-arm64
            runner: ubuntu-24.04-arm
            image: golang:1.24-alpine
            install: 'apk add --no-cache gcc musl-dev linux-headers git'
          # musl older — Alpine 3.16 (musl 1.2.3) with manual Go install
          - name: musl-1.2.3-amd64
            runner: ubuntu-latest
            image: alpine:3.16
            install: 'apk add --no-cache gcc musl-dev linux-headers git wget ca-certificates && wget -q https://go.dev/dl/go1.25.0.linux-amd64.tar.gz -O /tmp/go.tgz && tar -C /usr/local -xzf /tmp/go.tgz'
          - name: musl-1.2.3-arm64
            runner: ubuntu-24.04-arm
            image: alpine:3.16
            install: 'apk add --no-cache gcc musl-dev linux-headers git wget ca-certificates && wget -q https://go.dev/dl/go1.25.0.linux-arm64.tar.gz -O /tmp/go.tgz && tar -C /usr/local -xzf /tmp/go.tgz'
    steps:
      - uses: actions/checkout@v4

      - name: Run preload tests in container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            ${{ matrix.image }} \
            sh -c '${{ matrix.install }}; \
                   export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto; \
                   git init -q . 2>/dev/null || true; \
                   go version; \
                   gcc --version | head -1; \
                   go test -buildvcs=false -count=1 -timeout 600s ./tests/preload/... || \
                     go test -buildvcs=false -count=1 -timeout 600s ./tests/preload/...'

  # NOTE: the preload-chromium-matrix has been removed for v0.1.0.
  # Investigation in beta.39-beta.44 surfaced two real wrapper bugs
  # exposed by chromium-class workloads (recvmsg MSG_DONTWAIT not
  # propagated; IPv6 CONNECT silent close in fdproxy upstream_fail
  # path) that are tracked for v0.1.1 along with a faster, more
  # deterministic stub_client-2.0 / libuv-based non-blocking-I/O
  # synthetic test that will replace the chromium-via-real-browser
  # smoke as the primary wrapper integration test. The chromium
  # entry was also subject to GH-runner-environment flakiness
  # unrelated to the wrapper (chromium's GCM probes hitting Google's
  # deprecated endpoints, dbus init in stripped containers, etc.),
  # so even when the wrapper bugs are fixed the chromium smoke will
  # need additional sandbox flags before re-enabling.
  # Wrapper syscall coverage for the release is provided by:
  #   - preload-libc-matrix (5 libc × 2 arch = 10 entries, all green)
  #   - release-test (linux-amd64+arm64, macOS, Windows, all green)

  publish-release:
    name: publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-uwgsocks
      - build-uwgsocks-lite
      - build-turn
      - build-uwgwrapper
      - preload-libc-matrix
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release contents
        run: ls -lh dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-container-uwgsocks:
    name: publish uwgsocks container
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uwgsocks
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-container-turn:
    name: publish turn container
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uwgsocks-turn
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./turn/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
