name: Release Builds

on:
  push:
    tags:
      - '*'
      - '*/*'

permissions:
  contents: write
  packages: write

jobs:
  build-uwgsocks:
    name: uwgsocks ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: uwgsocks-linux-riscv64
          - goos: linux
            goarch: mips
            artifact_name: uwgsocks-linux-mips
          - goos: linux
            goarch: mipsle
            artifact_name: uwgsocks-linux-mipsle
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: uwgsocks-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: uwgsocks-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: uwgsocks-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: uwgsocks-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgsocks-lite:
    name: uwgsocks-lite ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-lite-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-lite-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: uwgsocks-lite-linux-riscv64
          - goos: linux
            goarch: mips
            artifact_name: uwgsocks-lite-linux-mips
          - goos: linux
            goarch: mipsle
            artifact_name: uwgsocks-lite-linux-mipsle
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-lite-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-lite-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: uwgsocks-lite-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: uwgsocks-lite-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: uwgsocks-lite-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: uwgsocks-lite-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-lite-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-lite-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks-lite
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -tags lite -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-turn:
    name: turn ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: turn-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: turn-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: turn-linux-riscv64
          - goos: linux
            goarch: mips64
            artifact_name: turn-linux-mips64
          - goos: darwin
            goarch: amd64
            artifact_name: turn-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: turn-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: turn-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: turn-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: turn-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: turn-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: turn-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: turn-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: turn/go.mod

      - name: Build turn
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cd turn
          go build -trimpath -ldflags='-s -w' -o "../dist/${{ matrix.artifact_name }}" .

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgwrapper:
    name: uwgwrapper linux ${{ matrix.goarch }} ${{ matrix.libc }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            libc: gnu
            runner: ubuntu-latest
            zig_target: x86_64-linux-gnu
            artifact_name: uwgwrapper-linux-amd64-gnu
          - goarch: amd64
            libc: musl
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
            artifact_name: uwgwrapper-linux-amd64-musl
          - goarch: arm64
            libc: gnu
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-gnu
            artifact_name: uwgwrapper-linux-arm64-gnu
          - goarch: arm64
            libc: musl
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-musl
            artifact_name: uwgwrapper-linux-arm64-musl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      # Run preload and wrapper tests before building the release artifact.
      # gnu: test natively using the system gcc (glibc), so LD_PRELOAD works correctly.
      # musl: test inside a Docker golang:alpine container (musl libc) for the same reason.
      - name: Test preload and wrapper (gnu)
        if: matrix.libc == 'gnu'
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
                     apt-get update >/dev/null && \
                     apt-get install -y gcc libc6-dev >/dev/null && \
                     mkdir -p cmd/uwgwrapper/assets && \
                     gcc -shared -fPIC -O2 -Wall -Wextra \
                       -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread && \
                     go test ./internal/uwgtrace/... ./internal/fdproxy/... && \
                     (go test ./tests/preload/... || go test ./tests/preload/...)'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Test preload and wrapper (musl)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          # golang:alpine uses musl; tests must run inside it so LD_PRELOAD resolves against musl.
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            golang:alpine \
            sh -c "apk add --no-cache gcc musl-dev linux-headers && \
                   mkdir -p cmd/uwgwrapper/assets && \
                   gcc -shared -fPIC -O2 -Wall -Wextra \
                     -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread && \
                   go test ./internal/uwgtrace/... ./internal/fdproxy/... && \
                   (go test ./tests/preload/... || go test ./tests/preload/...)"
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Build uwgwrapper preload asset (gnu baseline)
        if: matrix.libc == 'gnu'
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
                     apt-get update >/dev/null && \
                     apt-get install -y gcc libc6-dev >/dev/null && \
                     gcc -shared -fPIC -O2 -Wall -Wextra \
                       -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Build uwgwrapper preload asset (musl)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          zig cc -target ${{ matrix.zig_target }} -shared -fPIC -O2 -Wall -Wextra \
            -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread

      - name: Build uwgwrapper
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgwrapper

      - name: Show artifact details
        run: |
          ls -lh dist cmd/uwgwrapper/assets
          file "dist/${{ matrix.artifact_name }}" || true
          file cmd/uwgwrapper/assets/uwgpreload.so || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    name: publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-uwgsocks
      - build-uwgsocks-lite
      - build-turn
      - build-uwgwrapper
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release contents
        run: ls -lh dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-container-uwgsocks:
    name: publish uwgsocks container
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uwgsocks
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-container-turn:
    name: publish turn container
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uwgsocks-turn
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ./turn
          file: ./turn/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
